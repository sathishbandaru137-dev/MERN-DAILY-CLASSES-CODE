<!DOCTYPE html>
<html>
<head>
    <title>Survey Form</title>
</head>
<body>

<h2>Survey Form</h2>

<form>

    <label>User Name:</label>
    <input type="text" name="username" placeholder="Enter your name" required><br><br>

    <label>Feedback:</label>
    <textarea name="feedback" placeholder="Write your feedback" required></textarea><br><br>

    <label>Rating:</label>
    <input type="radio" name="rating" value="1" required>1
    <input type="radio" name="rating" value="2">2
    <input type="radio" name="rating" value="3">3
    <input type="radio" name="rating" value="4">4
    <input type="radio" name="rating" value="5">5<br><br>

    <label>Favorite Technology:</label>
    <select name="technology" required>
        <option value="">Select</option>
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>Python</option>
    </select><br><br>

    <label>
        <input type="checkbox" name="subscribe"> Subscribe to updates
    </label><br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html
