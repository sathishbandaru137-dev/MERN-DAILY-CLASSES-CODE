<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="pst">
        <fieldset>
            <h1>Job application</h1>
            <label for="first name">First name</label>
            <input type="text" id="fname" maxlength="8" minlength="2" required placeholder="enter first name">
            <br><br>
            <label for="lname">last name</label>
            <input type="text" id="lname" placeholder="enter last name" minlength="3" maxlength="6">
            <br><br>
            <label for="Email">Email</label>
            <input type="text" placeholder="############@gmail.com" >
            <br><br>
            <label for="Date of birth">date of birth</label> <input type="date">
            <br><br>
            <label for="Gender">Gender</label> 
            <input type="radio" name="Gender" id="male" > <label for="Gender">male</label>
             <input type="radio" id="namegender" name="Gender"> <label for="Gender">female</label>
             <input type="radio" id="namegender"name="Gender"> <label for="gender">others</label>
             <br><br>
             <label for="phone No">phone No</label>
             <input type="tel" placeholder="+91" minlength="10"> 
             <br><br>
             <label for="state">state</label>
             <select name="" id=" choose state">
                 <option value="choose state">choose state</option>
                <option value="AP">AP</option>
                 <option value="MP">MP</option>
                 <option value="DL">DL</option>
                 <option value="UP">UP</option>
                 </select>
                 <br><br>
                 <label for="address">address</label>
                 <textarea name="address" id=""></textarea> 
                  <br><br>

                 <label for="skill">skill</label>
                 <input type="checkbox" name="skill" id="nodejs" value="nodejs"> <label for="nodejs">nodejs</label>
                 <input type="checkbox" name="skill" id="reactjs" value="reactjs"> <label for="reactjs">reactjs</label>
                 <input type="checkbox" name="skill" id="mongodb" value="mongodb"> <label for="mongodb">mongodb</label>
                 <input type="checkbox" name="skill" id="java" value="java" > <label for="java">java</label>
                 <br><br>
                 <label for="language">language :</label>
                 <label for="english">english</label>
                 <input type="range" class="lang-range" id="english" name="english" min="0" max="100" value="0">
                 <label for="telugu">telugu</label>
                 <input type="range" class="lang-range" id="telugu" name="telugu" min="0" max="100" value="0">
                 <label for="hindi">hindi</label>
                 <input type="range" class="lang-range" id="hindi" name="hindi" min="0" max="100" value="0">
                 <br><br>
                 <label for="resume">resume</label>
                 <input type="file">
                 <br><br>
                 <button>submit </button>
                 <button>clear </button>
 
                
             </select>
        </fieldset>

    </form>
</body>
</html>
