<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .search-box {
            display: flex;
            margin-bottom: 25px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 25px 0 0 25px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
        }
        .search-box button {
            padding: 12px 20px;
            border: none;
            background-color: #3b82f6;
            color: white;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .search-box button:hover {
            background-color: #2563eb;
        }
        .weather-info {
            display: none;
        }
        .weather-info.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .location {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .temp {
            font-size: 56px;
            font-weight: 700;
            color: #0f172a;
            margin: 10px 0;
        }
        .condition-icon {
            width: 96px;
            height: 96px;
        }
        .condition-text {
            font-size: 20px;
            color: #475569;
            margin-bottom: 25px;
            text-transform: capitalize;
        }
        .details {
            display: flex;
            justify-content: space-around;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 15px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .detail-value {
            font-weight: 700;
            font-size: 18px;
            color: #1e293b;
        }
        .detail-label {
            font-size: 14px;
            color: #64748b;
            margin-top: 5px;
        }
        .error-message {
            color: #ef4444;
            font-weight: 500;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="Visakhapatnam">
            <button id="searchBtn">Search</button>
        </div>
        
        <div id="errorMessage" class="error-message">City not found. Please try again.</div>

        <div id="weatherInfo" class="weather-info">
            <div id="location" class="location">--</div>
            <img id="conditionIcon" class="condition-icon" src="" alt="Weather Icon">
            <div id="temperature" class="temp">--°C</div>
            <div id="conditionText" class="condition-text">--</div>
            
            <div class="details">
                <div class="detail-item">
                    <span id="humidity" class="detail-value">--%</span>
                    <span class="detail-label">Humidity</span>
                </div>
                <div class="detail-item">
                    <span id="windSpeed" class="detail-value">-- km/h</span>
                    <span class="detail-label">Wind Speed</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = '61962479962d4c0ab0a160437262102';
        
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const weatherInfo = document.getElementById('weatherInfo');
        const errorMessage = document.getElementById('errorMessage');

        const locationEl = document.getElementById('location');
        const temperatureEl = document.getElementById('temperature');
        const conditionIconEl = document.getElementById('conditionIcon');
        const conditionTextEl = document.getElementById('conditionText');
        const humidityEl = document.getElementById('humidity');
        const windSpeedEl = document.getElementById('windSpeed');

        function fetchWeather(city) {
            const apiUrl = `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}&aqi=no`;
            
            // Reset view state
            errorMessage.style.display = 'none';
            weatherInfo.classList.remove('active');

            fetch(apiUrl)
                .then(res => {
                    if (!res.ok) {
                        throw new Error('City not found');
                    }
                    return res.json();
                })
                .then(data => {
                    locationEl.innerText = `${data.location.name}, ${data.location.country}`;
                    temperatureEl.innerText = `${data.current.temp_c}°C`;
                    conditionIconEl.src = `https:${data.current.condition.icon}`;
                    conditionTextEl.innerText = data.current.condition.text;
                    humidityEl.innerText = `${data.current.humidity}%`;
                    windSpeedEl.innerText = `${data.current.wind_kph} km/h`;
                    
                    weatherInfo.classList.add('active');
                })
                .catch(err => {
                    console.error('Error fetching weather data:', err);
                    errorMessage.style.display = 'block';
                });
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                fetchWeather(city);
            }
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) {
                    fetchWeather(city);
                }
            }
        });
       
        fetchWeather(cityInput.value);
    </script>
</body>
</html>
