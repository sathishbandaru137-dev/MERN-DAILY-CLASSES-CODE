<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            color: #374151;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #head {
        color: white;
        margin-bottom: 25px;
        font-size: 3em;
       }
        header {
            background-color: #1f2937;
            color: white;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        form {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 25px;
            font-size: 2em;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="phone"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s ease-in-out;
            margin: 0 5px;
        }
        button[type="reset"] {
            background-color: #ef4444;
        }
        button:hover {
            background-color: #4338ca;
        }
        button[type="reset"]:hover {
            background-color: #dc2626;
        }
        p {
            margin-top: 20px;
            color: #4b5563;
        }
        p a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: bold;
        }
        p a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 1rem 0;
            width: 100%;
            margin-top: auto; /* Pushes footer to the bottom */
        }
        #login-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 10px;
        }
        #login-links a {
            background-color:  #4338ca;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            color:  #dad9e1;
            font-weight: bold;
            padding: 5px 10px;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
            text-decoration: none;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 10px
        }
        a img {
            border-radius: 50px ;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="head">E-Commerce Site</h1>
    </header>

    <main>
        <form action="" onsubmit="">
            <fieldset>
                <h1>Login</h1>
                <label for="username">User Name :</label>
                <input type="text" placeholder="user name" id="username" required>
                <label for="password">Password :</label>
                <input type="password" placeholder="password" id="password" required>
                <button type="submit">Login</button>
                <button type="reset">Reset</button>

                <h2>Or login with</h2>
                <div id="login-links">
                <a href="facebook.com">
                    <img src="https://static.vecteezy.com/system/resources/previews/016/716/447/non_2x/facebook-icon-free-png.png" alt="" height="20px" width="20px">Facebook</a>
                <a href="google.com"><img src="https://static.vecteezy.com/system/resources/previews/010/353/285/original/colourful-google-logo-on-white-background-free-vector.jpg" alt="" height="20px" width="20px">Google</a></a>
                </div>
                <p>Don't have an account <a href="./Register-page.html">Register</a></p>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 E-Commerce Site.</p>
    </footer>

    <script src="./Login-page.js"></script>
</body>
</html>
