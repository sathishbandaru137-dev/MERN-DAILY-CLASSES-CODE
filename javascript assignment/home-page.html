<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            color: #374151;
        }
        header {
            background-color: #1f2937;
            color: white;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        nav a {
            color: #d1d5db;
            padding: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease-in-out;
        }
        nav a:hover {
            color: #60a5fa;
        }
        .welcome-container {
            text-align: center;
            padding: 20px;
            background-color: #e0e7ff;
            color: #312e81;
            border-bottom: 1px solid #c7d2fe;
        }
        main {
            padding: 20px;
        }
        .products-section {
            text-align: center;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background-color: #fff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-bottom: none;
            margin-bottom: 15px;
        }
        .product-card h3 {
            font-size: 1.2em;
            color: #111827;
        }
        .product-card p {
            color: #4f46e5;
            font-weight: bold;
            font-size: 1.1em;
        }
        .product-card button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s ease-in-out;
        }
        .product-card button:hover {
            background-color: #4338ca;
        }
        footer {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 1rem 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>E-Commerce Site</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="./Login-page.html">Login Out</a>
        </nav>
    </header>

    <div class="welcome-container">
        <h2 id="welcome-message">Welcome, Guest!</h2>
    </div>

    <main>
        <section class="products-section">
            <h2>Featured Products</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://p1-ofp.static.pub/medias/27150701757_Legion_Pro_5_10_RGB_202504010320461756751344721.png?width=1200&height=1200" alt="Product 1">
                    <h3>Product 1</h3>
                    <p>$19.99</p>
                    <button>Add to Cart</button>
                </div>
                <div class="product-card">
                    <img src="https://p1-ofp.static.pub/medias/27150701757_Legion_Pro_5_10_RGB_202504010320461756751344721.png?width=1200&height=1200" alt="Product 2">
                    <h3>Product 2</h3>
                    <p>$29.99</p>
                    <button>Add to Cart</button>
                </div>
                <div class="product-card">
                    <img src="https://p1-ofp.static.pub/medias/27150701757_Legion_Pro_5_10_RGB_202504010320461756751344721.png?width=1200&height=1200" alt="Product 3">
                    <h3>Product 3</h3>
                    <p>$39.99</p>
                    <button>Add to Cart</button>
                </div>
                 <div class="product-card">
                    <img src="https://p1-ofp.static.pub/medias/27150701757_Legion_Pro_5_10_RGB_202504010320461756751344721.png?width=1200&height=1200" alt="Product 4">
                    <h3>Product 4</h3>
                    <p>$49.99</p>
                    <button>Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 E-Commerce Site.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const username = localStorage.getItem("username");
            const welcomeMessage = document.getElementById("welcome-message");
            if (username) {
                welcomeMessage.textContent = `Welcome, ${username}!`;
            }
        });
    </script>
</body>
</html>
