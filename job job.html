<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jobappliction</title>
</head>
<body>
    
    <form action="" method="" >
        <fieldset>
          <h1 align="center">Job Registration</h1>
        <label for="name">First Name:</label>
        <input type="text" id="name" name="name" required minlength="3" maxlength="8" placeholder="First Name"><br><br>
        
        <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required minlength="3" maxlength="8" placeholder="Last Name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="enter email"><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required placeholder="Enter age"><br><br>

        <lable for="gender">Gender:</lable>
        <input type="radio" name="gender" id="male" required><label for="male" >Male</label>
        <input type="radio" name="gender" id="female" required><label for="female" >Female</label><br><br>

        <lable for="tel">Phone:</lable>
        <input type="tel" name="tel" id="tel" placeholder="enter phone"><br><br>

        <lable for="address">Address:</lable><br>
        <textarea name="address" id=""></textarea><br><br>

        <label for="skills">Skills</label>
        <input type="checkbox" name="skills" id="nodejs" value="Nodejs"><label for="nodejs">Nodejs</label>
        <input type="checkbox" name="skills" id="reactjs" value="Reactjs"><label for="reactjs">Reactjs</label>
        <input type="checkbox" name="skills" id="git" value="Git"><label for="git">Git</label>
        <input type="checkbox" name="skills" id="mangodb" value="MangoDB"><label for="mangodb">MangoDB</label>
        <input type="checkbox" name="skills" id="angularjs" value="AngularJs"><label for="angularjs">AngularJs</label>

        <br><br>
        <label>Languages: </label><br>
        <label for="english">English:</label>
        <input type="range" class="lang-range" id="english" name="english" min="0" max="100" value="0">
        <label for="kannada">Kannada:</label>
        <input type="range" class="lang-range" id="kannada" name="kannada" min="0" max="100" value="0">
        <label for="telugu">Telugu:</label>
        <input type="range" class="lang-range" id="telugu" name="telugu" min="0" max="100" value="0"><br><br>

        <label for="resume">Upload Resume:</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx"><br><br>
         <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        </fieldset>

       
    </form>
</body>
</html>
