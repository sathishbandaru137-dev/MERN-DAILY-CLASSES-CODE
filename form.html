<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <form action="" method="get" style=" width: 800px;">
        <fieldset style="align-items: center; justify-content: center; background-image: url(./wallpaper.jpg); background-size: cover; border-radius: 10px 50px; padding: 50px; text-align: center; color: whitesmoke; text-shadow: 2px 2px 4px rgba(220, 211, 211, 0.5); font-size: 18px;  height: 400px; ">
            <legend align="center" style="border: 1px solid black; border-radius: 5px; padding: 2px; background-color: lightblue;">Personal Information</legend>
            <label for="name">Username:</label>
            <input type="text" id="name" name="name" placeholder="Enter Username"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter Password"><br><br>
            <button type="submit">Login</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
</body>
</html>
